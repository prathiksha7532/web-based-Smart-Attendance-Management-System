<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Attendance Management System</title>

    <link rel="stylesheet" href="style.css">

    <script defer src="https://cdn.jsdelivr.net/npm/face-api.js"></script>
    <script defer src="script.js"></script>
</head>

<body>

    <h1>🎓 Smart Attendance Management System</h1>
    <h3>Using Face Recognition</h3>

    <video id="video" width="640" height="480" autoplay muted></video>

    <br><br>

    <input type="text" id="studentId" placeholder="Enter Student ID"><br><br>

    <input type="text" id="studentName" placeholder="Enter Student Name"><br><br>

    <input type="text" id="department" placeholder="Enter Department"><br><br>

    <button id="startCamera">📷 Start Camera</button>
    <button id="registerStudent">👤 Register Student</button>
    <button id="takeAttendance">✅ Take Attendance</button>

    <h2 id="status">Status: Waiting...</h2>

</body>
</html>
